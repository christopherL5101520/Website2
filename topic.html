<!DOCTYPE html>
<!-- Topic page: displays a specific topic overview and study method options. -->
<html lang="en">
<head>
	<!-- The head sets up the page before any visible content appears. -->
	<meta charset="UTF-8" />
	<!-- UTF-8 handles normal text and symbols safely. -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<!-- This keeps the layout responsive on smaller screens. -->
	<title>Topic | Study AI Helper</title>
	<!-- The title identifies the page in the browser tab (updated dynamically by JavaScript). -->
	<link rel="stylesheet" href="style.css" />
	<!-- The same stylesheet is reused so every page looks like part of the same site. -->
</head>
<body class="page-topic">
	<!-- The body contains all visible page content. -->
	<header class="topbar">
		<!-- Shared header keeps navigation consistent across the whole site. -->
		<div class="brand">
			<!-- Placeholder logo spot. Later this can become an actual icon image. -->
			<div class="brand-icon" aria-hidden="true">AI</div>
			<!-- The span is just text for the site name. -->
			<span>Study AI Helper</span>
		</div>
		<!-- Repeating the nav on every page helps the user move around quickly. -->
		<nav class="nav-links" aria-label="Primary">
			<!-- Anchor elements are links to other HTML pages. -->
			<a href="index.html">Home</a>
			<a href="about.html">About</a>
			<a href="contacts.html">Contacts</a>
		</nav>
	</header>

	<!-- Main means this section is the primary page content. -->
	<main class="page">
		<!-- Topic hero section with title and key metrics. -->
		<section class="topic-hero">
			<div class="topic-hero-copy">
				<h1 id="topicTitle">Loading...</h1>
			</div>

			<aside class="topic-overview-card">
				<div class="topic-stat-row">
					<div class="topic-stat-item">
						<div class="topic-stat-label">Sections</div>
						<div class="topic-stat-value" id="topicSections">–</div>
					</div>
					<div class="topic-stat-item">
						<div class="topic-stat-label">Pass Rate</div>
						<div class="topic-stat-value" id="topicPassRate">–</div>
					</div>
					<div class="topic-stat-item">
						<div class="topic-stat-label">5 Rate</div>
						<div class="topic-stat-value" id="topicFiveRate">–</div>
					</div>
				</div>
			</aside>
		</section>

		<!-- Summary card sits just below the header and metrics. -->
		<section class="topic-summary">
			<div class="summary-card">
				<p id="topicSummary">Loading topic overview...</p>
			</div>
		</section>

		<!-- Study action buttons. -->
		<section class="topic-actions" aria-label="Learning options">
			<div class="topic-actions-intro">
				Choose the best way to learn this topic.
			</div>

			<button class="topic-action-btn" data-method="Ask Questions" type="button">
				Ask Questions
			</button>

			<button class="topic-action-btn" data-method="Practice Questions" type="button">
				Practice Questions
			</button>

			<button class="topic-action-btn" data-method="View Topics" type="button">
				View Topics
			</button>
		</section>

		<!-- Back to search link. -->
		<div style="text-align: center; margin-top: 40px;">
			<a href="index.html" class="topic-back-link">
				← Back to search
			</a>
		</div>
	</main>

	<!-- Script is loaded at the end so the page content loads first. -->
    <script>
        window.__TRACKER_API_URL__ = "https://website2-2ghb.onrender.com";
    </script>
    <script src="script.js"></script>
</body>
</html>
