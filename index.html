
<!DOCTYPE html>
<!-- The doctype tells the browser to use modern HTML rules. -->
<html lang="en">
<!-- The html element wraps the whole document. -->
<head>
    <!-- The head holds setup information that the user does not directly see. -->
    <meta charset="UTF-8" />
    <!-- UTF-8 lets the page handle normal letters, symbols, and many characters. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- This makes the page scale correctly on phones and tablets. -->
    <title>Website 2</title>
    <!-- The title appears in the browser tab and bookmarks. -->
    <link rel="stylesheet" href="style.css" />
    <!-- The CSS file is linked here so styles load before the page is shown. -->
</head>
<body class="page-home">
    <!-- The body contains everything visible on the webpage. -->
    <header class="topbar">
        <!-- Header is used for top content like a logo and navigation. -->
        <div class="brand">
            <!-- This wraps the icon and site name together as one brand area. -->
            <div class="brand-icon" aria-hidden="true">AI</div>
            <!-- aria-hidden means screen readers ignore this decorative icon. -->
            <span>Study AI Helper</span>
            <!-- Span is an inline element used here just for the site name text. -->
        </div>
        <div class="topbar-counters" aria-label="Live user stats">
            <span class="counter-item">
                <span class="counter-label">Active:</span>
                <span class="counter-value" id="activeUsers">0</span>
            </span>
            <span class="counter-item">
                <span class="counter-label">Total:</span>
                <span class="counter-value" id="totalUsers">0</span>
            </span>
            <span class="counter-item">
                <span class="counter-label">Peak:</span>
                <span class="counter-value" id="peakUsers">0</span>
            </span>
            <span class="counter-item">
                <span class="counter-label">Visits:</span>
                <span class="counter-value" id="totalVisits">0</span>
            </span>
        </div>
        <!-- Nav tells the browser this group of links is the main navigation. -->
        <nav class="nav-links" aria-label="Primary">
            <!-- Anchor tags create clickable links to other pages. -->
            <a href="index.html">Home</a>
            <!-- This link points back to the homepage. -->
            <a href="about.html">About</a>
            <!-- This link opens the About page. -->
            <a href="contacts.html">Contacts</a>
            <!-- This link opens the Contacts page. -->
        </nav>
    </header>

    <!-- Main holds the unique content for this specific page. -->
    <main class="page page-home-main">
        <!-- Search section spans the full homepage experience. -->
        <section class="search-hero">
            <!-- Heading introduces the search experience. -->
            <h1>What do you want to study?</h1>
            <!-- Search input for discovering topics. -->
            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search topics (e.g., SAT: Math, AP Chemistry)..."
                aria-label="Search study topics"
            />
            <!-- Autocomplete dropdown appears below the search input. -->
            <div
                id="searchDropdown"
                class="search-dropdown"
                role="listbox"
                aria-label="Search results"
            ></div>
        </section>
    </main>

    <!-- Script is loaded at the end so the page content loads first. -->
    <script>
        window.__TRACKER_API_URL__ = "https://website2-2ghb.onrender.com";
    </script>
    <script src="script.js"></script>
</body>
</html>
